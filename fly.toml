# fly.toml app configuration file generated for bot-hibrido on 2026-04-24T20:33:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bot-hibrido'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
